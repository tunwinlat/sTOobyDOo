name: Check Reminders

on:
  schedule:
    # Run every 5 minutes
    - cron: '*/5 * * * *'
  workflow_dispatch: # Allow manual triggering

jobs:
  check-reminders:
    runs-on: ubuntu-latest
    environment: Production  # <-- Add this line
    steps:
      - name: Trigger Reminders API
        run: |
          # Ensure URL has https:// prefix
          URL="${{ secrets.VERCEL_URL }}"
          if [[ ! "$URL" =~ ^https?:// ]]; then
            URL="https://$URL"
          fi
          
          echo "Calling: $URL/api/cron/reminders"
          
          curl -X GET "$URL/api/cron/reminders" \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            -f -v || echo "Request failed - check your VERCEL_URL and CRON_SECRET secrets"
